  <script src="scripts/shows.js"></script>
  <script src="scripts/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('past-shows-container');
      if (!container || typeof splitShows !== 'function') return;

      const { past } = splitShows();

      if (past.length === 0) {
        container.innerHTML = `<p class="shows-empty">No past shows on record yet.</p>`;
        return;
      }

      const table = document.createElement('table');
      table.className = 'past-shows-table';
      table.innerHTML = `
        <thead>
          <tr>
            <th>Date</th>
            <th>Event</th>
            <th>Venue</th>
            <th>City</th>
          </tr>
        </thead>
        <tbody id="past-shows-body"></tbody>
      `;

      const tbody = table.querySelector('#past-shows-body');

      past.forEach(show => {
        const dateObj   = new Date(show.date + 'T00:00:00');
        const formatted = dateObj.toLocaleDateString('en-CA', {
          year:  'numeric',
          month: 'long',
          day:   'numeric',
        });
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${formatted}</td>
          <td>${show.name}</td>
          <td>${show.venue}</td>
          <td>${show.city}</td>
        `;
        tbody.appendChild(tr);
      });

      container.appendChild(table);
    });
  </script>
